<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Kumikislap na Stars -->
    <div id="stars"></div>

    <!-- Lumilipad na Hearts -->
    <div id="hearts"></div>

    <div class="container">

        <h1 class="title">
            ❤️ I LOVE YOU ❤️
        </h1>

        <p class="subtitle">
            You're My Happiness Forever 💖
        </p>

        <div class="photo-box">

            <div class="circle">
                <img src="mahal.jpg (2).jpg" alt="">
            </div>

            <div class="circle">
                <img src="gf.jpg.jpg" alt="">
            </div>

        </div>

        <div class="question">
            Will You Date With Me?
        </div>

        <div class="buttons">

            <button class="yes" onclick="yesAnswer()">
                YES 💖
            </button>

            <button class="no" id="noBtn">
                NO 💔
            </button>

        </div>

        <p class="footer">
            Made with ❤️ by Rio
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
